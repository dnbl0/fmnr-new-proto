<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Video Hero — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'FatFrank';
      src: url('../fatfrank.otf') format('opentype');
      font-weight: 900;
      font-style: normal;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: #f9f9f9;
      overflow-x: hidden;
    }

    /* ===================== VIDEO BANNER ===================== */
    .video-banner {
      position: relative;
      height: 800px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }

    .video-banner-bg {
      position: absolute;
      inset: 0;
    }

    .video-banner-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-banner-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 26%, rgba(0,0,0,0) 47%);
    }

    .video-banner-content {
      position: relative;
      z-index: 10;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .video-banner-inner {
      max-width: 1280px;
      width: 100%;
      padding: 40px 40px 80px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100%;
    }

    .video-controls {
      display: flex;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .video-controls-pill {
      background: white;
      border-radius: 999px;
      padding: 4px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .video-controls-pill button {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      color: #333;
    }

    .video-controls-pill img {
      width: auto;
      height: 18px;
      max-width: none;
      display: block;
      object-fit: contain;
    }

    .banner-overline {
      font-family: 'Lato', sans-serif;
      font-weight: 900;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: white;
      margin-bottom: 12px;
    }

    .banner-heading {
      font-family: 'FatFrank', 'Impact', 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: 72px;
      line-height: 1;
      text-transform: uppercase;
      color: white;
      margin-bottom: 32px;
      max-width: 700px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
    }

    .btn-primary {
      background: white;
      color: #111;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 28px;
      border: 2px solid white;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-secondary {
      background: transparent;
      color: white;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 28px;
      border: 2px solid white;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
    }

    /* Demo hint */
    .demo-hint {
      max-width: 1280px;
      margin: 32px auto;
      padding: 0 40px;
      color: #666;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .banner-heading { font-size: 36px; }
    }
  </style>
</head>
<body>
  <section class="video-banner">
    <div class="video-banner-bg" aria-hidden="true">
      <video id="hero-video" playsinline preload="metadata" autoplay muted tabindex="-1" aria-hidden="false">
        <source src="https://fmnrhub.com.au/wp-content/uploads/2024/05/FMNR-TRANsITION.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <div class="video-banner-overlay"></div>
    </div>
    <div class="video-banner-content">
      <div class="video-banner-inner">
        <p class="banner-overline">Our Impact</p>
        <h1 class="banner-heading">Numbers that speak for themselves</h1>
        <div class="btn-group">
          <a href="#" class="btn-primary">Learn More</a>
          <a href="#" class="btn-secondary">Watch Film</a>
        </div>
        <div class="video-controls">
          <div class="video-controls-pill" role="group" aria-label="Video controls">
            <button id="btn-toggle" title="Pause" aria-pressed="true">
              <img id="icon-toggle" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24'><rect x='6' y='5' width='4' height='14' fill='%23000'/><rect x='14' y='5' width='4' height='14' fill='%23000'/></svg>" alt="Pause" width="18" height="18" />
            </button>
            <button id="btn-mute" title="Unmute" aria-pressed="true">
              <img id="icon-volume" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24'><path d='M11 5L6 9H2v6h4l5 4V5z' fill='%23000'/><line x1='16' y1='9' x2='22' y2='15' stroke='%23000' stroke-width='2' stroke-linecap='round'/><line x1='22' y1='9' x2='16' y2='15' stroke='%23000' stroke-width='2' stroke-linecap='round'/></svg>" alt="Muted" width="18" height="18" />
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <p class="demo-hint">Click the video or the pause/mute buttons to control playback.</p>

  <script>
    // Hero video controls — mirrors index.html
    (function () {
      const video = document.getElementById('hero-video');
      if (!video) return;

      const btnToggle = document.getElementById('btn-toggle');
      const btnMute = document.getElementById('btn-mute');
      const iconToggle = document.getElementById('icon-toggle');
      const iconVolume = document.getElementById('icon-volume');

      const playIconSrc = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24'><polygon points='6,4 20,12 6,20' fill='%23000'/></svg>";
      const pauseIconSrc = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24'><rect x='6' y='5' width='4' height='14' fill='%23000'/><rect x='14' y='5' width='4' height='14' fill='%23000'/></svg>";
      const volumeOnSrc = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24'><path d='M11 5L6 9H2v6h4l5 4V5z' fill='%23000'/><path d='M15 9a3 3 0 010 6' stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round'/><path d='M18 6a7 7 0 010 12' stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round'/></svg>";
      const volumeMuteSrc = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24'><path d='M11 5L6 9H2v6h4l5 4V5z' fill='%23000'/><line x1='16' y1='9' x2='22' y2='15' stroke='%23000' stroke-width='2' stroke-linecap='round'/><line x1='22' y1='9' x2='16' y2='15' stroke='%23000' stroke-width='2' stroke-linecap='round'/></svg>";

      function updatePlayUI() {
        if (!iconToggle) return;
        iconToggle.src = video.paused ? playIconSrc : pauseIconSrc;
        if (btnToggle) btnToggle.setAttribute('aria-pressed', (!video.paused).toString());
        btnToggle.title = video.paused ? 'Play' : 'Pause';
      }

      function updateVolumeUI() {
        if (!iconVolume) return;
        iconVolume.src = video.muted ? volumeMuteSrc : volumeOnSrc;
        if (btnMute) btnMute.setAttribute('aria-pressed', (video.muted).toString());
        btnMute.title = video.muted ? 'Unmute' : 'Mute';
      }

      if (btnToggle) btnToggle.addEventListener('click', () => {
        if (video.paused) video.play(); else video.pause();
        updatePlayUI();
      });
      if (btnMute) btnMute.addEventListener('click', () => { video.muted = !video.muted; updateVolumeUI(); });

      video.addEventListener('click', () => { if (video.paused) video.play(); else video.pause(); updatePlayUI(); });
      video.addEventListener('play', updatePlayUI);
      video.addEventListener('pause', updatePlayUI);
      video.addEventListener('volumechange', updateVolumeUI);

      try { video.muted = true; video.play().catch(()=>{}); } catch(e){}

      updatePlayUI();
      updateVolumeUI();
    })();
  </script>
</body>
</html>
