<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Video Hero — Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body,html{height:100%;margin:0}
    .hero{position:relative;height:80vh;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff}
    .hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .hero-overlay{position:relative;z-index:2;padding:20px;text-align:center}
    .hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.6));z-index:1}
    .demo-wrap{max-width:1280px;margin:0 auto}
  </style>
</head>
<body>
  <section class="hero demo-wrap">
    <video autoplay muted loop playsinline src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"></video>
    <div class="hero-overlay">
      <h1 style="font-size:clamp(28px,5vw,56px);margin:0;">FMNR — Restoring Landscapes</h1>
      <p style="opacity:0.9;">Autoplay hero demo with gradient overlay</p>
      <div style="margin-top:12px;"><button style="background:#077D57;color:#fff;padding:10px 16px;border-radius:6px;border:none">Learn more</button></div>
    </div>
  </section>
</body>
</html>
