<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Video Hero — Demo</title>
  <script src="assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body,html{height:100%;margin:0}
    .hero{position:relative;height:80vh;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff}
    .hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .hero-overlay{position:relative;z-index:2;padding:20px;text-align:center}
    .hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0.7));z-index:1}
    .demo-wrap{max-width:1280px;margin:0 auto}
  </style>
</head>
<body>
  <section class="video-banner">
    <div class="video-banner-bg" aria-hidden="true">
      <video id="hero-video" playsinline preload="metadata" autoplay muted tabindex="-1" aria-hidden="false">
        <source src="https://fmnrhub.com.au/wp-content/uploads/2024/05/FMNR-TRANsITION.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <div class="video-banner-overlay"></div>
    </div>
    <div class="video-banner-content">
      <div class="video-banner-inner">
        <p class="banner-overline">Our Impact</p>
        <h1 class="banner-heading">Numbers that speak for themselves</h1>
        <div class="btn-group">
          <a href="#" class="btn-primary">Learn More</a>
          <a href="#" class="btn-secondary">Watch Film</a>
        </div>
        <div class="video-controls">
          <div class="video-controls-pill" role="group" aria-label="Video controls">
            <button id="btn-toggle" title="Pause" aria-pressed="true">
              <img id="icon-toggle" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24'><rect x='6' y='5' width='4' height='14' fill='%23000'/><rect x='14' y='5' width='4' height='14' fill='%23000'/></svg>" alt="Pause" width="18" height="18" />
            </button>
            <button id="btn-mute" title="Unmute" aria-pressed="true">
              <img id="icon-volume" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24'><path d='M11 5L6 9H2v6h4l5 4V5z' fill='%23000'/><line x1='16' y1='9' x2='22' y2='15' stroke='%23000' stroke-width='2' stroke-linecap='round'/><line x1='22' y1='9' x2='16' y2='15' stroke='%23000' stroke-width='2' stroke-linecap='round'/></svg>" alt="Muted" width="18" height="18" />
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="assets/js/footer.js" defer></script>
  <script src="assets/js/site-a11y.js" defer></script>
  <script src="assets/js/motion-init.js" defer></script>
</body>
</html>
